<!doctype html>
<html lang="de">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
      <nav>
        <a href="{{ "/" | relURL }}#about">About</a>
        <a href="{{ "/" | relURL }}#timeline">Lebenslauf</a>
        <a href="{{ "/" | relURL }}#contact">Kontakt</a>
        <a href="{{ "impressum/" | relURL }}">Impressum</a>
        <a href="{{ "datenschutz/" | relURL }}">Datenschutz</a>
      </nav>
    </div>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ now.Format "2006" }} {{ (index .Site.Data.profile "name") }} - Full-Stack Developer</p>
      <p><a href="{{ "impressum/" | relURL }}">Impressum</a> | <a href="{{ "datenschutz/" | relURL }}">Datenschutz</a></p>
    </div>
  </footer>
</body>
</html>
